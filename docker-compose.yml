# Local development stack
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: launchtrac
      POSTGRES_USER: launchtrac
      POSTGRES_PASSWORD: launchtrac_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  nats:
    image: nats:2-alpine
    command: ["--jetstream", "--store_dir=/data"]
    ports:
      - "4222:4222"  # Client
      - "8222:8222"  # Monitoring
    volumes:
      - natsdata:/data

volumes:
  pgdata:
  natsdata:
